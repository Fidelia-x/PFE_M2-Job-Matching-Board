services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: job_matching_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: job_matching
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./airflow/init.sql:/docker-entrypoint-initdb.d/01_init_airflow.sql # CREATE USER airflow / CREATE DATABASE airflow
      # - ./database/init.sql:/docker-entrypoint-initdb.d/02_init_project.sql  # ligne pour charger automatiquement votre script
  
  pgadmin:
    image: dpage/pgadmin4
    container_name: job_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  minio:
    image: minio/minio
    container_name: job_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
  
  airflow-webserver:
    image: apache/airflow:2.8.0
    container_name: job_airflow-webserver
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__LOGGING__LOGGING_LEVEL=INFO
      - _AIRFLOW_DB_UPGRADE=true        # initialise la BDD automatiquement
      - _AIRFLOW_WWW_USER_CREATE=true   # crée l'admin automatiquement
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    command: webserver
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
  
  airflow-scheduler:
    image: apache/airflow:2.8.0
    container_name: job_airflow-scheduler
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__LOGGING__LOGGING_LEVEL=INFO
    depends_on:
      - postgres
      - airflow-webserver
    command: scheduler
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      
  fastapi:
    build:
      context: ./backend  # dossier contenant ton api.py et requirements.txt
      dockerfile: Dockerfile
    container_name: job_fastapi
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  # streamlit:
  #   build:
  #     context: ./backend
  #     dockerfile: streamlit/Dockerfile
  #   container_name: job_streamlit
  #   ports:
  #     - "8501:8501"
  #   depends_on:
  #     - backend

volumes:
  postgres_data:
  minio_data: